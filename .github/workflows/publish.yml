name: Publish to ClawHub

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clawhub CLI
        run: npm install -g clawhub

      - name: Configure clawhub auth
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          mkdir -p "$HOME/.config/clawhub"
          echo "{\"registry\":\"https://clawhub.ai\",\"token\":\"$CLAWHUB_TOKEN\"}" \
            > "$HOME/.config/clawhub/config.json"

      - name: Prepare skill package (exclude .github)
        run: |
          mkdir -p /tmp/skill-publish
          rsync -av --exclude='.github' --exclude='.git' . /tmp/skill-publish/

      - name: Publish to ClawHub
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          clawhub publish /tmp/skill-publish \
            --slug token-safety-checker \
            --name "Token Safety Checker" \
            --version "$VERSION" \
            --changelog "Release $VERSION"
